name: uv build
on: push

jobs:
  uv-build:
    name: python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.10"
          enable-cache: true
      - name: uv build
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: build output
          path: dist/
