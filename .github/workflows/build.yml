name: uv build
on:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  uv-build:
    name: python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm


      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.10"
          enable-cache: true
      - name: uv build
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: build output
          path: dist/
      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          AWS_ENDPOINT_URL_S3: https://t3.storage.dev
          AWS_ENDPOINT_URL_IAM: https://iam.storage.dev
        run: aws s3 cp dist/*.whl s3://together-public/sprocket/
