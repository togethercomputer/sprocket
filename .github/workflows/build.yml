name: uv build
on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  uv-build:
    name: python
    runs-on: ubuntu-latest
    if: ${{ github.repository != "togethercomputer/sprocket" }} # don't build from public repo
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm


      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.10"
          enable-cache: true
      - name: uv build
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: build output
          path: dist/
      - name: Upload to S3 and update PyPI index
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          AWS_ENDPOINT_URL_S3: https://47b1b605b8ff0371ec661ebaf3b433c1.r2.cloudflarestorage.com
        run: |
          # Upload wheel
          aws s3 cp dist/*.whl s3://together-pypi/simple/sprocket/
          
          # List all wheels and generate index
          aws s3 ls s3://together-pypi/simple/sprocket/ | grep '\.whl$' | awk '{print $4}' | python3 -c "
          import sys
          print('<!DOCTYPE html>')
          print('<html>')
          print('<head><title>Links for sprocket</title></head>')
          print('<body>')
          print('    <h1>Links for sprocket</h1>')
          for line in sys.stdin:
              wheel = line.strip()
              print(f'    <a href=\"{wheel}\">{wheel}</a><br>')
          print('</body>')
          print('</html>')
          " > index.html
          
          # Upload index
          aws s3 cp index.html s3://together-pypi/simple/sprocket/index.html --content-type text/html
